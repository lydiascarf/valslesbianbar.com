<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Location - Val's Lesbian Bar</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="description" content="Find Val's Lesbian Bar in Philadelphia" />
    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon" />
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon" />
    <link
      href="https://cdn.jsdelivr.net/npm/modern-normalize@v2.0.0/modern-normalize.min.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Slab:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" type="text/css" href="style.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <meta name="theme-color" content="#e20043" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
  </head>
  <body class="location-page">
    <div class="location-container">
      <h1>Find Us</h1>

      <div class="address">
        <p>605 S 3rd St</p>
        <p>Philadelphia, PA 19147</p>
      </div>

      <div id="map"></div>

      <a href="index.html" class="back-link">← Back to home</a>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // Coordinates for 605 S 3rd St, Philadelphia, PA 19147
        const lat = 39.9415;
        const lng = -75.1459;

        const map = L.map("map").setView([lat, lng], 16);

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution:
            '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
          maxZoom: 19,
        }).addTo(map);

        const marker = L.marker([lat, lng]).addTo(map);
        marker
          .bindPopup(
            "<strong>Val's Lesbian Bar</strong><br>605 S 3rd St<br>Philadelphia, PA 19147",
          )
          .openPopup();
      });
    </script>
  </body>
</html>
