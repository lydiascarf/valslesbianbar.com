    datetime: "2026-03-18T16:00:00-04:00"
    description: "Val's Lesbian Bar celebrates its grand opening March 18, with a full cocktail and mocktail menu, food, and gays, gays, gays. Enjoy the new space, it's yours <3"
    flyer: "assets/20260318_flyer.jpeg"
  - title: "poetik.selektions @ Val's Upstairs"
    datetime: "2026-03-28T21:00:00-04:00"
    description: |
      Saturday night, Upstairs at Val's. Shake ass, get weird, feel good, all night!

      @poetik.selektions hittin you with beats you know and love, and some you've never heard before. No cover. 9-1 (unless??)
    flyer: "assets/20260328_flyer.png"
  - title: "Tush Push Queer Line Dancing"
    datetime: "2026-04-04T19:00:00-04:00"
    description: |
      Boots down, birds up 🦅
      Queer country western dancing at Val's Lesbian Bar - Join us for the first ever Tush Push! Whether you're a seasoned line dancer, or stepping out for the first time, this one's all about building a love of line and partner dancing, and community in the city that never stops pushin'.

      What to expect:
      Line dance + 2-step all night

      Beginner friendly lessons at 8:30PM & 9:30PM

      Welcoming dance floor for all levels

      2 step lessons from 7-8PM before we open the dance floor! Late night 2-Step from Midnight - Late.

      Never been line dancing? Bar is open all night before - Come grab a drink with us before we opened the dance floor and our Tush Push angels will show you a few moves 🤠
    flyer: "assets/20260404_flyer.jpeg"
  - title: "Queer Afro-Latin Dance Night"
    datetime: "2026-04-24T21:00:00-04:00"
    description: |
      Friday, April 24th 9pm-1am, Queer Afro-Latin Dance is at Val's Lesbian Bar for a night to remember! NO COVER, but come early as we WILL hit capacity! 

      9pm-10pm Afro-Latin Dance Lesson (Beginner Salsa on 1, Beginner Bachata) by @djcassiana

      10pm-12am Afro-Latin Dance Social (Salsa, Bachata, Merengue, Cumbia) by @djcassiana

      12am-1am HORA DE PERREO (Dembow, Reggaeton, Neo Perreo, Brazilian Funke and more) by @djcassiana

      QAL Dance welcomes and celebrates all identities at their Queer Afro-Latin dance events, including the LGBTQIA+ community and allies. We have ZERO tolerance for harassment of any kind! If you ever feel unsafe or uncomfortable at our events, please don't hesitate to approach staff from QAL Dance and/or Val's. Your safety and enjoyment are our priorities!
    flyer: "assets/20260424_flyer.png"
  - title: "Lavender Panzies Not-So-Secret Garden Party, fundraiser for QAMP and We Are the Seeds"
    datetime: "2026-05-01T21:00:00-04:00"
    description: |
      Lavender Panzies is putting on this fundraiser dance party upstairs at Val's to keep Qamp a sliding-scale event, with 10% of cover funds going to indigenous org We Are the Seeds. Come to Val's and dance the night away with some beautiful queers! Winter is over, let's heat up with some disco!

      May 1st

      8pm-2am
      
      Feat. DJ iiinfinite + friends
      
      $10-$15 cover
    flyer: "assets/20260501_flyer.png"
  - title: "ThirdSpace"
    datetime: "2026-05-15T21:00:00-04:00"
    description: |
      Third Space comes to Philly May 15: "We're building something that doesn't exist enough
      
      Not just a party.
      
      Not just networking.
      
      A space in between - where Black & Brown Sapphic creatives can meet, build, and be seen!
      
      Sober Friendly!
      
      DJs. Producers. Designers. Stylists. Photographers. Videographers. Organizers. Connectors.
      
      ALL MEDIUMS!

      6-8PM ---> Intentional connection
      
      Speed networking, creative prompts
      
      8-9PM ---> Open mingle
      
      Follow up, exchange
      
      9PM-late ---> Dance floor release
      We celebrate. We move. We let it all out together.

      
      This is for the ones tired of "networking" that goes nowhere.
      
      For the creatives who want community, not just contacts.
      
      Tap in.
      
      RSVP link in bio.
      Presented by SYNCSONIC.
    flyer: "assets/20260515_flyer.png"
  - title: Crafty Sundays at Val's
    repeat:
      interval: 'weekly'
      weekday: 0
      hour: 16
      minute: 0
    description: |
      If YOU look like THIS MOUSE, come to Val's on any given Sunday, bring your craft, enjoy our happy hour 4-6, and meet other crafty queers who make beautiful things! Informal meetup, no RSVP, no cover, all good vibes, every Sunday. 21+ with valid ID (we are still a bar).
    flyer: "assets/sundays_craft_flyer.jpg"
  - title: Karaoke at Val's
    repeat:
      interval: 'weekly'
      weekday: 4
      hour: 21
      minute: 0
    description: |
      Karaoke EVERY THURSDAY, 9-1, Upstairs at Val's. With your ever-illustrious, always-graceful, silky smooth host: Mr. Wish. Every Thursday. Gay every time.
    flyer: "assets/thursdays_karaoke_flyer.jpg"