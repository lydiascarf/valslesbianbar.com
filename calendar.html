<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta property="og:title" content="Events @ Val's Lesbian Bar" />
    <meta
      property="og:description"
      content="Upcoming events at Val's Lesbian Bar"
    />
    <meta
      property="og:image"
      content="https://valslesbianbar.com/static/assets/vals.png"
    />
    <meta property="og:url" content="https://valslesbianbar.com/calendar" />
    <title>Events @ Val's</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="description" content="Upcoming events at Val's Lesbian Bar" />
    <link rel="shortcut icon" href="static/assets/favicon.ico" type="image/x-icon" />
    <link rel="icon" href="static/assets/favicon.ico" type="image/x-icon" />
    <link
      href="https://cdn.jsdelivr.net/npm/modern-normalize@v2.0.0/modern-normalize.min.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Slab:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" type="text/css" href="static/style.css" />
    <meta name="theme-color" content="#e20043" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/isSameOrAfter.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/timezone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/utc.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/weekday.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
    <script>
      dayjs.extend(window.dayjs_plugin_isSameOrAfter);
      dayjs.extend(window.dayjs_plugin_timezone);
      dayjs.extend(window.dayjs_plugin_utc);
      dayjs.extend(window.dayjs_plugin_weekday);
    </script>
  </head>
  <body class="calendar-page">
    <div class="calendar-container">
      <div
        x-data="{ 
          events: [],
          loading: true,
          error: null,
          
          async init() {
            try {
              const oneoffResponse = await fetch('content/events/oneoffs');
              const repeatingResponse = await fetch('content/events/repeating_generated');
              if (!oneoffResponse.ok || !repeatingResponse.ok) {
                throw new Error('Failed to load events directory');
              }
              
              const oneoffText = await oneoffResponse.text();
              const repeatingText = await repeatingResponse.text();
              const oneoffFileNames = this.parseDirectoryListing(oneoffText);
              const repeatingFileNames = this.parseDirectoryListing(repeatingText);
              const oneoffYamlFiles = oneoffFileNames.filter(f => f.endsWith('.yaml')).map(f => `content/events/oneoffs/${f}`);
              const repeatingYamlFiles = repeatingFileNames.filter(f => f.endsWith('.yaml')).map(f => `content/events/repeating_generated/${f}`);
              const allYamlFiles = oneoffYamlFiles.concat(repeatingYamlFiles);

              let allEvents = [];
              for (const fileName of allYamlFiles) {
                const fileResponse = await fetch(fileName);
                if (!fileResponse.ok) continue;
                
                const yamlText = await fileResponse.text();
                const data = jsyaml.load(yamlText);
                const events = Array.isArray(data.events) ? data.events : [data];
                allEvents = allEvents.concat(events);
              }
              
              this.events = (allEvents || []).sort((a, b) => 
                dayjs(a.datetime).tz('America/New_York').valueOf() - 
                dayjs(b.datetime).tz('America/New_York').valueOf()
              );
              this.loading = false;
            } catch (err) {
              console.error('Error loading events:', err);
              this.error = 'Something went wrong loading events 😭';
              this.loading = false;
            }
          },

          parseDirectoryListing(htmlContent) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlContent, 'text/html');
            const links = doc.querySelectorAll('a');
            const files = [];
            
            links.forEach(link => {
              const href = link.getAttribute('href');
              if (href && href !== '../' && !href.endsWith('/') && href.endsWith('.yaml')) {
                files.push(href);
              }
            });
            
            return files;
          },

          now() {
            return dayjs().tz('America/New_York');
          },
          
          upcomingEvents() {
            return this.events.filter(event => 
              dayjs(event.datetime).tz('America/New_York').isSameOrAfter(this.now())
            ).sort((a, b) => 
              dayjs(a.datetime).tz('America/New_York').valueOf() - 
              dayjs(b.datetime).tz('America/New_York').valueOf()
            );
          },
          
          pastEvents() {
            return this.events.filter(event => 
              dayjs(event.datetime).tz('America/New_York').isBefore(this.now())
            ).sort((a, b) => 
              dayjs(b.datetime).tz('America/New_York').valueOf() - 
              dayjs(a.datetime).tz('America/New_York').valueOf()
            );
          },
          
          formatDate(datetime) {
            return dayjs(datetime).tz('America/New_York').format('ddd, MMM D, h:mm A');
          },
          
          openEvent: null,
          
          parseMarkdown(text) {
            return marked.parse(text);
          }
        }"
      >
        <div>
          <h1>Calendar</h1>
          <div x-show="loading" class="loading">Loading events...</div>
          <div x-show="error" class="error" x-text="error"></div>
          <div x-show="!loading && !error" x-ref="calendar"></div>
        </div>
        <template x-if="upcomingEvents().length > 0">
          <h2>Upcoming</h2>
        </template>
        <div class="events-list">
          <template x-for="(event) in upcomingEvents()" :key="event.flyer">
            <div class="event-item">
              <button
                class="event-header"
                @click="openEvent = openEvent === event.flyer ? null : event.flyer"
                :aria-expanded="openEvent === event.flyer"
              >
                <div class="event-title" x-text="event.title"></div>
                <div
                  class="event-datetime"
                  x-text="formatDate(event.datetime)"
                ></div>
                <span
                  class="event-toggle"
                  x-text="openEvent === event.flyer ? '−' : '+'"
                ></span>
              </button>
              <div
                class="event-description"
                x-show="openEvent === event.flyer"
                x-transition:enter="transition ease-out duration-300"
                x-transition:enter-start="opacity-0 transform -translate-y-2"
                x-transition:enter-end="opacity-100 transform translate-y-0"
                x-transition:leave="transition ease-in duration-200"
                x-transition:leave-start="opacity-100 transform translate-y-0"
                x-transition:leave-end="opacity-0 transform -translate-y-2"
              >
                <img
                  x-show="event.flyer"
                  x-transition
                  :src="event.flyer"
                  class="event-flyer"
                  alt="Event flyer"
                />
                <div x-html="parseMarkdown(event.description)"></div>
              </div>
            </div>
          </template>
        </div>
        <template x-if="pastEvents().length > 0">
          <h2>Past</h2>
        </template>
        <div class="events-list">
          <template x-for="(event) in pastEvents()" :key="event.flyer">
            <div class="event-item">
              <button
                class="event-header"
                @click="openEvent = openEvent === event.flyer ? null : event.flyer"
                :aria-expanded="openEvent === event.flyer"
              >
                <div class="event-title" x-text="event.title"></div>
                <div
                  class="event-datetime"
                  x-text="formatDate(event.datetime)"
                ></div>
                <span
                  class="event-toggle"
                  x-text="openEvent === event.flyer ? '−' : '+'"
                ></span>
              </button>
              <div
                class="event-description"
                x-show="openEvent === event.flyer"
                x-transition:enter="transition ease-out duration-300"
                x-transition:enter-start="opacity-0 transform -translate-y-2"
                x-transition:enter-end="opacity-100 transform translate-y-0"
                x-transition:leave="transition ease-in duration-200"
                x-transition:leave-start="opacity-100 transform translate-y-0"
                x-transition:leave-end="opacity-0 transform -translate-y-2"
              >
                <img
                  x-show="event.flyer"
                  x-transition
                  :src="event.flyer"
                  class="event-flyer"
                  alt="Event flyer"
                />
                <div x-html="parseMarkdown(event.description)"></div>
              </div>
            </div>
          </template>
        </div>
      </div>

      <a href="index.html" class="back-link">← Back to home</a>
    </div>
  </body>
</html>
