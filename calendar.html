<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta property="og:title" content="Events @ Val's Lesbian Bar" />
    <meta property="og:description" content="Upcoming events at Val's Lesbian Bar" />
    <meta property="og:image" content="https://valslesbianbar.com/assets/vals.png" />
    <meta property="og:url" content="https://valslesbianbar.com/calendar" />
    <title>Events @ Val's</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="description" content="Upcoming events at Val's Lesbian Bar" />
    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon" />
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon" />
    <link
      href="https://cdn.jsdelivr.net/npm/modern-normalize@v2.0.0/modern-normalize.min.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Slab:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" type="text/css" href="style.css" />
    <meta name="theme-color" content="#e20043" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/isSameOrAfter.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/utc.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/timezone.js"></script>
    <script>
      dayjs.extend(window.dayjs_plugin_isSameOrAfter);
      dayjs.extend(window.dayjs_plugin_utc);
      dayjs.extend(window.dayjs_plugin_timezone);
    </script>
  </head>
  <body class="calendar-page">
    <div class="calendar-container">
      <div
        x-data="{ 
          events: [
            {
              title: `Opening Night!`,
              datetime: '2026-03-18T16:00:00-04:00',
              description: `Val's Lesbian Bar celebrates its grand opening March 18, with a full cocktail and mocktail menu, food, and gays, gays, gays. Enjoy the new space, it's yours <3`,
              flyer: 'assets/20260318_flyer.jpeg'
            },
            {
              title: `poetik.selektions @ Val's Upstairs`,
              datetime: '2026-03-28T21:00:00-04:00',
              description: `
Saturday night, Upstairs at Val's. Shake ass, get weird, feel good, all night!

@poetik.selektions hittin you with beats you know and love, and some you've never heard before. No cover. 9-1 (unless??)
              `,
              flyer: 'assets/20260328_flyer.png'
            },
            {
              title: 'Tush Push Queer Line Dancing',
              datetime: '2026-04-04T19:00:00-04:00',
              description: `
Boots down, birds up 🦅
Queer country western dancing at Val's Lesbian Bar - Join us for the first ever Tush Push! Whether you're a seasoned line dancer, or stepping out for the first time, this one's all about building a love of line and partner dancing, and community in the city that never stops pushin'. 

What to expect:
Line dance + 2-step all night

Beginner friendly lessons at 8:30PM & 9:30PM

Welcoming dance floor for all levels 

2 step lessons from 7-8PM before we open the dance floor! Late night 2-Step from Midnight - Late. 

Never been line dancing? Bar is open all night before - Come grab a drink with us before we opened the dance floor and our Tush Push angels will show you a few moves 🤠`,
              flyer: 'assets/20260404_flyer.jpeg'
            },
          ].sort((a, b) => dayjs(a.datetime).tz('America/New_York').valueOf() - dayjs(b.datetime).tz('America/New_York').valueOf()),
          now() {
            return dayjs().tz('America/New_York');
          },
          upcomingEvents() {
            return this.events.filter(event => dayjs(event.datetime).tz('America/New_York').isSameOrAfter(this.now()));
          },
          pastEvents() {
            return this.events.filter(event => dayjs(event.datetime).tz('America/New_York').isBefore(this.now()));
          },
          formatDate(datetime) {
            return dayjs(datetime).tz('America/New_York').format('ddd, MMM D, h:mm A');
          },
          openEvent: null,
          parseMarkdown(text) {
            return marked.parse(text);
          }
        }"
      >
        <h1>Upcoming Events</h1>
        <div class="events-list">
          <template x-for="(event) in upcomingEvents()" :key="event.flyer">
            <div class="event-item">
              <button
                class="event-header"
                @click="openEvent = openEvent === event.flyer ? null : event.flyer"
                :aria-expanded="openEvent === event.flyer"
              >
                <div class="event-title" x-text="event.title"></div>
                <div
                  class="event-datetime"
                  x-text="formatDate(event.datetime)"
                ></div>
                <span
                  class="event-toggle"
                  x-text="openEvent === event.flyer ? '−' : '+'"
                ></span>
              </button>
              <div
                class="event-description"
                x-show="openEvent === event.flyer"
                x-transition:enter="transition ease-out duration-300"
                x-transition:enter-start="opacity-0 transform -translate-y-2"
                x-transition:enter-end="opacity-100 transform translate-y-0"
                x-transition:leave="transition ease-in duration-200"
                x-transition:leave-start="opacity-100 transform translate-y-0"
                x-transition:leave-end="opacity-0 transform -translate-y-2"
              >
                <img
                  x-show="event.flyer"
                  x-transition
                  :src="event.flyer"
                  class="event-flyer"
                  alt="Event flyer"
                />
                <div x-html="parseMarkdown(event.description)"></div>
              </div>
            </div>
          </template>
        </div>
        <h1>Past Events</h1>
        <div class="events-list">
          <template x-for="(event) in pastEvents()" :key="event.flyer">
            <div class="event-item">
              <button
                class="event-header"
                @click="openEvent = openEvent === event.flyer ? null : event.flyer"
                :aria-expanded="openEvent === event.flyer"
              >
                <div class="event-title" x-text="event.title"></div>
                <div
                  class="event-datetime"
                  x-text="formatDate(event.datetime)"
                ></div>
                <span
                  class="event-toggle"
                  x-text="openEvent === event.flyer ? '−' : '+'"
                ></span>
              </button>
              <div
                class="event-description"
                x-show="openEvent === event.flyer"
                x-transition:enter="transition ease-out duration-300"
                x-transition:enter-start="opacity-0 transform -translate-y-2"
                x-transition:enter-end="opacity-100 transform translate-y-0"
                x-transition:leave="transition ease-in duration-200"
                x-transition:leave-start="opacity-100 transform translate-y-0"
                x-transition:leave-end="opacity-0 transform -translate-y-2"
              >
                <img
                  x-show="event.flyer"
                  x-transition
                  :src="event.flyer"
                  class="event-flyer"
                  alt="Event flyer"
                />
                <div x-html="parseMarkdown(event.description)"></div>
              </div>
            </div>
          </template>
        </div>
      </div>

      <a href="index.html" class="back-link">← Back to home</a>
    </div>
  </body>
</html>
